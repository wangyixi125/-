<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>恋爱占有欲测试</title>
    <style>
        :root {
            --primary-color: #6c5ce7;
            --bg-color: #f8f9fd;
            --card-bg: #ffffff;
            --text-main: #2d3436;
            --text-sub: #636e72;
            --accent-color: #a29bfe;
        }

        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(#dcdde1 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            background: var(--primary-color);
            background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            color: white;
            text-align: center;
            padding: 60px 0;
            margin-bottom: -40px;
            clip-path: ellipse(100% 60% at 50% 40%);
        }

        header h1 {
            margin: 0;
            font-size: 2.2rem;
            letter-spacing: 2px;
        }

        .container {
            width: 90%;
            max-width: 800px;
            margin-bottom: 50px;
            position: relative;
        }

        .question-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 25px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            transition: transform 0.3s ease;
            animation: fadeIn 0.6s ease forwards;
        }

        .question-card:hover {
            transform: translateY(-5px);
        }

        .question-card h3 {
            margin-top: 0;
            font-size: 1.15rem;
            line-height: 1.6;
            color: var(--text-main);
            border-left: 5px solid var(--primary-color);
            padding-left: 15px;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        .options label {
            padding: 15px 20px;
            border: 2px solid #f1f2f6;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            font-size: 1rem;
        }

        .options label:hover {
            background-color: #f9f9ff;
            border-color: var(--accent-color);
        }

        .options input[type="radio"] {
            margin-right: 12px;
            width: 18px;
            height: 18px;
            accent-color: var(--primary-color);
        }

        /* 选中状态 */
        .options label:has(input:checked) {
            background-color: #f0eeff;
            border-color: var(--primary-color);
            color: var(--primary-color);
            font-weight: bold;
        }

        .button-container {
            text-align: center;
            padding: 20px 0;
        }

        .button {
            padding: 18px 80px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(108, 92, 231, 0.3);
            transition: all 0.3s ease;
        }

        .button:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 30px rgba(108, 92, 231, 0.4);
        }

        .button:disabled {
            background-color: #dfe6e9;
            color: #b2bec3;
            cursor: not-allowed;
            box-shadow: none;
        }

        .result {
            display: none;
            background: var(--card-bg);
            border-radius: 24px;
            padding: 40px;
            margin-top: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            animation: slideUp 0.8s ease;
        }

        .result h2 {
            text-align: center;
            color: var(--primary-color);
            font-size: 2rem;
            margin-bottom: 30px;
        }

        #result-text {
            font-size: 1.2rem;
            line-height: 1.8;
            color: #2d3436;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 15px;
            border-left: 8px solid var(--primary-color);
            margin-bottom: 30px;
        }

        #result-details h3 {
            color: var(--primary-color);
            margin-top: 30px;
            border-bottom: 2px solid #f1f2f6;
            padding-bottom: 10px;
        }

        #result-details p {
            line-height: 1.8;
            color: var(--text-sub);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            header { padding: 40px 0; }
            .question-card { padding: 20px; }
            .button { width: 100%; }
        }
    </style>
</head>
<body>

<header>
    <h1>恋爱占有欲测试</h1>
</header>

<div class="container">
    <div id="questions-container"></div>
    <div class="button-container">
        <button class="button" id="submit-btn" onclick="submitAnswers()">提交答案</button>
    </div>

    <div class="result" id="result-container">
        <h2>测试结果</h2>
        <p id="result-text"></p>
        <div id="result-details"></div>
        <div class="button-container">
            <button class="button" onclick="window.location.reload()" style="background-color: #636e72; font-size: 1rem; padding: 12px 40px;">重新测试</button>
        </div>
    </div>
</div>

<script>
    // 原始题目数据（完全未改动）
    const questions = [
        {question: "你希望伴侣把你的需求放在他们家人的需求之前吗？", options: ["A. 从不", "B. 很少", "C. 有时", "D. 经常", "E. 总是"]},
        {question: "如果伴侣在社交场合忙于照顾他人，而忽略了你，你会有什么反应？", options: ["A. 完全不介意", "B. 很少介意", "C. 偶尔会感到不满", "D. 经常会觉得被忽略", "E. 总是感到不满，觉得被冷落"]},
        {question: "在面对伴侣忙碌时，你是否希望他们能优先考虑你而不是其他事情？", options: ["A. 从不希望", "B. 很少希望", "C. 有时希望", "D. 经常希望", "E. 总是希望"]},
        {question: "如果伴侣的朋友或同事找他聊天，而他花很长时间回复，你会感到什么？", options: ["A. 完全不在意", "B. 很少不安", "C. 有时会觉得被忽视", "D. 经常感到不安", "E. 总是感到不满，觉得他对我不重视"]},
        {question: "当伴侣和他人（异性或同性）分享了他们的私人事情时，你会有何反应？", options: ["A. 完全不介意", "B. 很少介意", "C. 偶尔会感到不安", "D. 经常会感到不适", "E. 总是感到不舒服，觉得被排除在外"]},
        {question: "你是否希望伴侣能时常向你报告他们的日常活动或社交互动？", options: ["A. 从不希望", "B. 很少希望", "C. 有时希望", "D. 经常希望", "E. 总是希望他们报告给我"]},
        {question: "当伴侣与他人（特别是异性）有较多联系时，你会感觉如何？", options: ["A. 完全不介意", "B. 很少不安", "C. 有时会感到不安", "D. 经常感到不安", "E. 总是感到不安，觉得被忽视"]},
        {question: "如果伴侣在没有提前告诉你的情况下，决定和朋友或家人外出，你会感到什么？", options: ["A. 完全不介意", "B. 很少不安", "C. 有时会感到被忽视", "D. 经常会觉得被冷落", "E. 总是觉得不安，觉得被排除在外"]},
        {question: "你希望伴侣能够花时间陪伴你，而不是花时间和朋友或家人待在一起吗？", options: ["A. 完全不希望", "B. 很少希望", "C. 有时希望", "D. 经常希望", "E. 总是希望"]},
        {question: "当伴侣需要做决定时，你是否希望他们首先考虑你的意见？", options: ["A. 从不希望", "B. 很少希望", "C. 有时希望", "D. 经常希望", "E. 总是希望"]},
        {question: "你希望伴侣对你保持绝对的忠诚，无论是在言语上还是行为上吗？", options: ["A. 从不希望", "B. 很少希望", "C. 有时希望", "D. 经常希望", "E. 总是希望"]},
        {question: "如果伴侣和异性朋友保持亲密的关系，你会怎么想？", options: ["A. 完全不介意", "B. 很少不安", "C. 有时感到不安", "D. 经常感到不安", "E. 总是感到不满，觉得不合适"]},
        {question: "你是否希望伴侣把你列为他们的第一优先事项？", options: ["A. 完全不希望", "B. 很少希望", "C. 有时希望", "D. 经常希望", "E. 总是希望"]},
        {question: "如果伴侣与你的家人或朋友相处得更好，你会有何感受？", options: ["A. 完全不在意", "B. 很少不安", "C. 有时会觉得被冷落", "D. 经常感到不安", "E. 总是感到不安，觉得自己被忽视"]},
        {question: "你希望伴侣能够更多关注你的情感需求而不是他们的工作吗？", options: ["A. 从不希望", "B. 很少希望", "C. 有时希望", "D. 经常希望", "E. 总是希望"]},
        {question: "当伴侣和你讨论感情时，你是否希望他们专心聆听你的想法和感受？", options: ["A. 从不希望", "B. 很少希望", "C. 有时希望", "D. 经常希望", "E. 总是希望"]},
        {question: "你希望伴侣能在和你一起的时候保持手机静音，专注于你吗？", options: ["A. 从不希望", "B. 很少希望", "C. 有时希望", "D. 经常希望", "E. 总是希望"]},
        {question: "如果伴侣为了别人放弃与你的约定，你会有什么感受？", options: ["A. 完全不介意", "B. 很少介意", "C. 偶尔会感到失望", "D. 经常会感到失望", "E. 总是感到失望，觉得被忽视"]},
        {question: "你是否认为伴侣应该避免与他人（尤其是异性）保持过于亲密的关系？", options: ["A. 完全不认为", "B. 很少认为", "C. 有时认为", "D. 经常认为", "E. 总是认为"]},
        {question: "你是否希望伴侣将与你共度的时光放在其他社交活动之前？", options: ["A. 完全不希望", "B. 很少希望", "C. 有时希望", "D. 经常希望", "E. 总是希望"]},
        {question: "当伴侣不在你身边时，你是否会担心他们与他人发生过多接触？", options: ["A. 从不担心", "B. 很少担心", "C. 偶尔会担心", "D. 经常会担心", "E. 总是担心"]},
    ];

    // 显示问题及选项
    const questionsContainer = document.getElementById('questions-container');
    questions.forEach((q, index) => {
        const questionDiv = document.createElement('div');
        questionDiv.classList.add('question-card');
        questionDiv.style.animationDelay = (index * 0.05) + "s"; // 阶梯式入场

        const questionTitle = document.createElement('h3');
        questionTitle.textContent = `${index + 1}. ${q.question}`;
        questionDiv.appendChild(questionTitle);

        const optionsDiv = document.createElement('div');
        optionsDiv.classList.add('options');
        q.options.forEach(option => {
            const optionLabel = document.createElement('label');
            optionLabel.innerHTML = `<input type="radio" name="q${index}" value="${option[0]}"> ${option}`;
            optionsDiv.appendChild(optionLabel);
        });

        questionDiv.appendChild(optionsDiv);
        questionsContainer.appendChild(questionDiv);
    });

    function submitAnswers() {
        let totalScore = 0;
        for (let i = 0; i < questions.length; i++) {
            const selectedOption = document.querySelector(`input[name="q${i}"]:checked`);
            if (selectedOption) {
                totalScore += ["A", "B", "C", "D", "E"].indexOf(selectedOption.value);
            } else {
                alert("请回答所有问题");
                return;
            }
        }

        // 显示结果（原始逻辑与文字完全保留）
        const resultContainer = document.getElementById('result-container');
        const resultText = document.getElementById('result-text');
        const resultDetails = document.getElementById('result-details');
        const questionsContainer = document.getElementById('questions-container');
        const submitBtn = document.getElementById('submit-btn');
        
        let resultMessage = "";

        if (totalScore < 40) {
            resultMessage = "你在恋爱中展现出较低的占有欲。你能够理解伴侣的独立性，尊重他们的私人空间，拥有很强的信任感。这种态度帮助你们的关系更加健康和自由。";
            resultDetails.innerHTML = `
            <h3>建议: 如何保持和增强信任与独立性</h3>
            <p>你在恋爱中的表现表明你具备较强的独立性和成熟的情感处理能力。你理解伴侣的个人空间和独立性，并且能够尊重和信任他们的选择。这种态度有助于建立一种健康、平等、自由的关系。在感情中，你能够很好地处理不依赖伴侣的情感需求，这使得你在面对关系中的挑战时更具心理弹性。<br><br>
            然而，在恋爱中保持这种健康的独立性仍然需要你继续维护和强化对伴侣的信任。在长期的关系中，维持互相尊重的私人空间对于双方的情感成长至关重要。你也许可以更加关注两人共同成长的目标，而不仅仅是自己情感需求的满足。<br><br>
            为了更好地维护你和伴侣的情感关系，你可以通过以下几点来进一步巩固信任与独立性：<br>
            1. **保持透明的沟通**：在关系中保持开放和诚实的沟通，避免对彼此产生误解或疏远。<br>
            2. **尊重彼此的独立性**：允许对方有个人的空间，不因对方的社交活动或独立生活方式而感到不安。<br>
            3. **自我充实**：在感情之外，注重个人的成长与独立，这样你会发现自己在爱情之外也能保持足够的满足感。<br>
            4. **共同规划未来**：与伴侣共同讨论和规划未来的目标，确保你们在情感和生活上的目标一致，从而增进关系的稳定性。<br><br>
            这种健康的独立与信任感，能够帮助你们的关系变得更加稳固和持久。</p>
            `;
        } else if (totalScore < 60) {
            resultMessage = "你的占有欲处于中等水平。虽然你信任伴侣，但有时会在某些情况下感到不安。你可能会适度表达自己的情感需求，希望伴侣能更多关注你。";
            resultDetails.innerHTML = `
            <h3>建议: 如何平衡情感需求与信任</h3>
            <p>在感情中，你显得既有独立性，也有一定的情感需求。你知道如何在必要时保持个人空间，同时又希望伴侣能够时刻关注到你的需求。这种中等水平的占有欲可能反映了你对关系中的安全感需求，同时也表明你意识到并尊重伴侣的独立性。<br><br>
            然而，你可能会时不时产生不安，这种情感反应源于你对伴侣的期望与现实之间的差距。为了更好地管理这种不安情绪，可以采取以下策略：<br>
            1. **学会表达需求**：如果你希望伴侣更多关注你，可以通过平和的沟通表达自己的感受，而不是让不安情绪积压。<br>
            2. **增加情感安全感**：增强和伴侣之间的信任和沟通，通过明确和一致的情感支持让你们的关系更稳定。<br>
            3. **调整期望**：认识到并接受伴侣的局限性，不必把他们所有的时间和精力都放在你身上，适当调整期望值。<br>
            4. **学习自我调节**：当你感到不安时，可以通过冥想、运动等方式调整自己的情绪，帮助自己恢复冷静。<br><br>
            通过这些方法，你能有效减少占有欲带来的焦虑，同时在关系中保持健康的沟通和情感投入。</p>
            `;
        } else {
            resultMessage = "你在恋爱中展现出较强的占有欲。你可能会常常感到不安，并希望能够掌控伴侣的社交圈或行为。这种情感需求可能源自内心的不安全感，可能会对关系产生压力。";
            resultDetails.innerHTML = `
            <h3>建议: 如何管理占有欲与不安情绪</h3>
            <p>你在恋爱中的占有欲较强，可能会觉得需要时刻关注伴侣的行为，尤其是在伴侣与他人接触时。你渴望得到更多的关注和安全感，这种情感需求或许源于内心的不安全感。在关系中，过度的占有欲容易导致关系的紧张甚至破裂，因此，学会管理和调整这些情绪对于你们的关系至关重要。<br><br>
            以下是一些建议，帮助你处理过度占有欲带来的负面影响：<br>
            1. **深入探索不安源**：思考并找出让你感到不安的根源，是过往的经历，还是对未来的不确定性。了解自己情绪的来源，有助于你更好地理解自己。<br>
            2. **建立信任感**：与伴侣建立更深层次的信任和沟通，减少对他们行为的控制欲。在信任的基础上，你们的关系会更加健康与持久。<br>
            3. **避免过度控制**：过度控制伴侣的行为只会加剧他们的反感和不满，而你也会感到更加焦虑。学会接受伴侣的独立性，并尊重他们的选择。<br>
            4. **心理调适**：当感到不安时，可以通过冥想、放松训练等方式进行自我调节，避免情绪失控。<br>
            5. **寻求专业支持**：如果占有欲带来的问题难以自我调节，可以考虑寻求心理咨询的帮助，学会调整情感需求的表达方式和管理情绪的技巧。<br><br>
            通过这些方法，你可以逐步减少占有欲带来的困扰，建立更加健康和谐的关系。</p>
            `;
        }

        resultText.textContent = resultMessage;
        
        // 隐藏问题区域，显示结果
        questionsContainer.style.display = "none";
        submitBtn.style.display = "none";
        resultContainer.style.display = "block";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
</script>

</body>
</html>
